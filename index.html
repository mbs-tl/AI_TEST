<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Image Detection Test</title>

<style>

body{
font-family:Arial;
background:white;
text-align:center;
margin:40px;
}

img{
max-width:500px;
margin:20px;
}

button{
padding:10px 20px;
margin:5px;
}

#timer{
font-size:22px;
font-weight:bold;
}

.reasons{
text-align:left;
display:inline-block;
margin-top:15px;
}

</style>
</head>

<body>

<h2>Image Detection Test</h2>

<div id="intro">

<p>Age</p>
<input id="age" type="number">

<p>Sex</p>
<select id="sex">
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>

<br><br>

<button onclick="startTest()">Start Test</button>

</div>

<div id="test" style="display:none">

<div id="timer">50</div>

<img id="image">

<br>

<button onclick="answer('real')">Real</button>
<button onclick="answer('ai')">AI</button>

<br><br>

<div class="reasons" id="reasonsSection" style="display:none">

<b>If AI, why?</b><br>

<label><input type="checkbox" value="lighting"> Art style / Lighting</label><br>
<label><input type="checkbox" value="background"> Background</label><br>
<label><input type="checkbox" value="anatomy"> Anatomy problems</label><br>
<label><input type="checkbox" value="objects"> Objects</label><br>
<label><input type="checkbox" value="cohesiveness"> Cohesiveness</label><br>
<label><input type="checkbox" value="textures"> Unnatural textures</label><br>
<label><input type="checkbox" value="other"> Others / Doubts</label>

</div>

<br><br>

<p>Confidence (%)</p>
<input type="range" min="0" max="100" value="50" id="confidence">

<br><br>

<button onclick="nextImage()">Next</button>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbwwgQjNf7fALk4kewU296XDVSUvUkYP623_j3Og-OkholAWQkYg0L-BJ0QS-WA6SDD_3g/exec

let images=[]
let current=0
let time=30
let timer

let age=""
let sex=""
let currentAnswer=null

async function loadImages(){

let response=await fetch("images.json")
let data=await response.json()

images=data.images
images.sort(()=>Math.random()-0.5)

document.getElementById("image").src=images[current]

}

function startTest(){

age=document.getElementById("age").value
sex=document.getElementById("sex").value

document.getElementById("intro").style.display="none"
document.getElementById("test").style.display="block"

loadImages()
startTimer()

}

function startTimer(){

time=50
document.getElementById("timer").innerText=time

timer=setInterval(function(){

time--
document.getElementById("timer").innerText=time

if(time<=0){

clearInterval(timer)

saveResult("no_rep")

nextImage()

}

},1000)

}

function answer(val){

currentAnswer=val

if(val=="ai"){

document.getElementById("reasonsSection").style.display="block"

}else{

document.getElementById("reasonsSection").style.display="none"

}

}

function getReasons(){

let checked=[]
let boxes=document.querySelectorAll("#reasonsSection input:checked")

boxes.forEach(b=>{
checked.push(b.value)
})

return checked

}

function saveResult(prediction){

let data={

age:age,
sex:sex,
image:images[current],
prediction:prediction,
reasons:getReasons().join(","),
confidence:document.getElementById("confidence").value

}

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})

}

function nextImage(){

if(currentAnswer==null){

alert("Please select Real or AI")
return

}

if(currentAnswer=="ai"){

let reasons=getReasons()

if(reasons.length==0){

alert("Please select at least one reason")
return

}

}

clearInterval(timer)

saveResult(currentAnswer)

currentAnswer=null

document.querySelectorAll("#reasonsSection input").forEach(el=>el.checked=false)

document.getElementById("reasonsSection").style.display="none"

current++

if(current>=images.length){

finishTest()
return

}

document.getElementById("image").src=images[current]

startTimer()

}

function finishTest(){

document.getElementById("test").innerHTML="<h2>Test finished. Thank you!</h2>"

}

</script>

</body>
</html>
