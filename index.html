<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>AI Image Detection Test</title>

<style>

body{
background:white;
font-family:Arial;
text-align:center;
margin:40px;
}

img{
max-width:600px;
margin:20px;
}

.timer{
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<div id="intro">

<h2>Participant Information</h2>

<p>Age</p>
<input type="number" id="age">

<p>Sex</p>

<select id="sex">
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
<option value="prefer_not">Prefer not to say</option>
</select>

<br><br>

<button onclick="startTest()">Start Test</button>

</div>

<div id="test" style="display:none;">

<h2>Image Detection Test</h2>

<div class="timer">
Time left: <span id="time">50</span>
</div>

<img id="testImage">

<p>Do you think this image is:</p>

<label><input type="radio" name="type" value="real">Real</label>
<label><input type="radio" name="type" value="ai">AI Generated</label>

<p>If artificial why?</p>

<label><input type="checkbox" value="lighting">Lighting</label><br>
<label><input type="checkbox" value="background">Background</label><br>
<label><input type="checkbox" value="anatomy">Anatomy problems</label><br>
<label><input type="checkbox" value="objects">Objects</label><br>
<label><input type="checkbox" value="cohesiveness">Cohesiveness</label><br>
<label><input type="checkbox" value="textures">Unnatural textures</label><br>
<label><input type="checkbox" value="other">Others</label>

<p>Confidence (%)</p>

<input type="range" min="0" max="100" value="50" id="confidence">

<p><span id="confidenceValue">50</span>%</p>

<button onclick="nextImage()">Next</button>

</div>

<script>

if(localStorage.getItem("testCompleted")){
document.body.innerHTML="You already completed this test.";
}

let participantID="P"+Math.random().toString(36).substring(2,9);

let age;
let sex;

let images=[];
let current=0;

async function loadImages(){

let response=await fetch("images.json");

let data=await response.json();

images=data.images;

images.sort(()=>Math.random()-0.5);

document.getElementById("testImage").src=images[current];

}

let slider=document.getElementById("confidence");
let output=document.getElementById("confidenceValue");

slider.oninput=function(){
output.innerHTML=this.value;
}

function startTest(){

age=document.getElementById("age").value;
sex=document.getElementById("sex").value;

document.getElementById("intro").style.display="none";
document.getElementById("test").style.display="block";

loadImages();

}

let time=50;

setInterval(function(){

time--;
document.getElementById("time").innerText=time;

if(time<=0){
nextImage();
}

},1000);

function sendData(data){

fetch("https://script.google.com/macros/s/AKfycbxeGYEOm102G1Q9-uqQtTXs8oIlv_IJ6y6--bskyuOrpATVNZf2zjwIWGleTJDwP8IeqA/exec",{

method:"POST",
body:JSON.stringify(data)

});

}

function nextImage(){

let type=document.querySelector('input[name="type"]:checked');

let reasons=[];
document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb=>{
reasons.push(cb.value);
});

let confidence=slider.value;

sendData({

participantID:participantID,
age:age,
sex:sex,
image:images[current],
prediction:type?type.value:"none",
reasons:reasons.join("|"),
confidence:confidence

});

document.querySelectorAll("input").forEach(el=>{
if(el.type==="radio"||el.type==="checkbox") el.checked=false;
});

slider.value=50;
output.innerHTML=50;

time=50;

current++;

if(current>=images.length){

localStorage.setItem("testCompleted",true);

alert("Test finished");

return;

}

document.getElementById("testImage").src=images[current];

}

</script>

</body>

</html>
