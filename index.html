<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Detection Test</title>

    <!-- Tailwind -->
    https://cdn.tailwindcss.com

    <!-- Lucide Icons -->
    <script src="https://unpkg.comt

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #4f46e5;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>

<body class="bg-zinc-50 text-zinc-900 min-h-screen flex items-center justify-center p-4">

    <!-- INTRO SCREEN -->
    <div id="intro-screen" class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-zinc-100">
        <div class="flex items-center gap-3 mb-6">
            <div class="p-3 bg-indigo-50 rounded-2xl text-indigo-600">
                <i data-lucide="brain" class="w-8 h-8"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold">Détection d'Image</h1>
                <p class="text-zinc-500 text-sm">Étude de Recherche</p>
            </div>
        </div>

        <div class="space-y-6">

            <div class="space-y-2">
                <label class="text-sm font-semibold text-zinc-700 flex items-center gap-2">
                    <i data-lucide="user" class="w-4 h-4"></i> Âge
                </label>
                <input type="number" id="age" placeholder="Votre âge"
                       class="w-full px-4 py-3 rounded-xl border border-zinc-200 outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-zinc-700 flex items-center gap-2">
                    <i data-lucide="user-circle" class="w-4 h-4"></i> Sexe
                </label>
                <select id="sex"
                        class="w-full px-4 py-3 rounded-xl border border-zinc-200 outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    <option value="male">Homme</option>
                    <option value="female">Femme</option>
                    <option value="other">Autre</option>
                </select>
            </div>

            <button onclick="startTest()"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2">
                Commencer le Test
                <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- TEST SCREEN -->
    <div id="test-screen" class="hidden w-full max-w-4xl grid grid-cols-1 lg:grid-cols-2 gap-8">

        <!-- IMAGE ZONE -->
        <div class="relative">
            <div class="absolute top-4 right-4 z-10 bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full shadow-lg flex items-center gap-2">
                <i data-lucide="clock" class="w-4 h-4 text-zinc-600"></i>
                <span id="timer" class="font-mono font-bold text-zinc-900">50s</span>
            </div>

            <div class="aspect-[4/3] rounded-3xl overflow-hidden bg-zinc-200 shadow-2xl border-4 border-white">
                <img id="test-image" src="" class="w-full h-full object-cover">
            </div>

            <div class="mt-4 flex justify-between items-center px-2">
                <span id="progress-text" class="text-sm font-medium text-zinc-400">Image 1 sur 6</span>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-zinc-100 flex flex-col">
            <h2 class="text-xl font-bold text-zinc-900 mb-6 flex items-center gap-2">
                <i data-lucide="info" class="w-5 h-5 text-indigo-500"></i>
                Réelle ou IA ?
            </h2>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="selectAnswer('real')" id="btn-real"
                        class="py-4 rounded-2xl font-bold transition-all flex flex-col items-center gap-2 border-2 border-zinc-100 text-zinc-400">
                    <i data-lucide="check-circle-2" class="w-6 h-6"></i> Réelle
                </button>

                <button onclick="selectAnswer('ai')" id="btn-ai"
